mppi_controller:
  ros__parameters:
    mppi:
      samples: 1000
      control_frequency: 50
      horizon: 50
      accel_dist: 1.0
      steer_dist: 0.05
      temperature: 1.0
      alpha: 1.0
      n_sigma: 4
    
    cost_weights:
      q_x: 1.0
      q_y: 1.0
      q_heading: 0.0
      q_vx: 1.0
      q_vy: 0.5
      q_yaw_rate: 0.0
      r_accel: 0.0001
      r_steering: 0.01
      r_steering_rate: 0.01

    visualization:
      enable_viz: true
      top_k_paths: 10
      line_width: 0.05
      path_alpha: 1.0

local_map:
  ros__parameters:
    local_map:
      size: 10.0
      resolution: 0.05
      inflation_radius: 0.05
      lethal_cost: 100
      inscribed_cost: 99
      decay_power: 0.02
      publish_rate_hz: 60.0
    topics:
      scan: "/scan"
      odom: "/ego_racecar/odom"
      costmap: "/local_costmap"
    frames:
      costmap: "ego_racecar/base_link"

bridge:
  ros__parameters:
    target_laps: 5
    output_file: /workspace/lap_test.csv

    # topics and namespaces
    ego_namespace: 'ego_racecar'
    ego_scan_topic: 'scan'
    ego_odom_topic: 'odom'
    ego_opp_odom_topic: 'opp_odom'
    ego_drive_topic: 'drive'
    opp_namespace: 'opp_racecar'
    opp_scan_topic: 'opp_scan'
    opp_odom_topic: 'odom'
    opp_ego_odom_topic: 'opp_odom'
    opp_drive_topic: 'opp_drive'

    # map parameters
    map_path: '/home/prachit/Projects/racing/sim/src/f1tenth_gym_ros/maps/Spielberg_map'
    # map_path: '/workspace/src/f1tenth_gym_ros/maps/simple_oval_obstacles'
    # map_path: '/workspace/src/f1tenth_gym_ros/maps/simple_oval'
    map_img_ext: '.png'
    
    # transform related
    scan_distance_to_base_link: 0.275
    
    # laserscan parameters
    scan_fov: 4.7
    scan_beams: 1080

    # opponent parameters
    num_agent: 1

    # ego starting pose on map
    sx: 2.0
    sy: 0.0
    stheta: 0.3

    # opp starting pose on map
    sx1: 2.0
    sy1: -30.5
    stheta1: 0.0

    # teleop
    kb_teleop: True